<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Viatura - URE Araçatuba</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #0f172a; 
            --secondary: #475569; 
            --accent: #2563eb; 
            --accent-hover: #1d4ed8; 
            --success: #059669; 
            --danger: #dc2626; 
            --warning: #d97706; 
            --bg-body: #f8fafc; 
            --card-bg: #ffffff; 
            --spin-color: #0ea5e9; 
            --onix-color: #8b5cf6; 
            --text-main: #1e293b; 
            --text-muted: #64748b; 
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); 
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius: 16px; 
            --border: #e2e8f0; 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-body); 
            margin: 0; 
            padding: 30px 20px; 
            color: var(--text-main); 
            -webkit-font-smoothing: antialiased;
        }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 40px; }
        header h2 { font-weight: 800; color: var(--primary); margin: 0; font-size: 36px; text-transform: uppercase; letter-spacing: -1.5px; }
        header h4 { color: var(--accent); margin: 8px 0 0 0; font-weight: 600; font-size: 15px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.9; }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 40px; }
        .stat-card { 
            background: linear-gradient(145deg, #ffffff, #f8fafc); 
            padding: 24px 30px; 
            border-radius: var(--radius); 
            box-shadow: var(--shadow-md); 
            border: 1px solid var(--border);
            border-left: 6px solid var(--accent); 
            transition: all 0.3s ease; 
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .stat-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 8px; }
        .stat-value { font-size: 36px; font-weight: 800; display: block; color: var(--primary); line-height: 1; }

        .card { 
            background: var(--card-bg); 
            border-radius: var(--radius); 
            padding: 35px; 
            margin-bottom: 40px; 
            border: 1px solid var(--border); 
            box-shadow: var(--shadow-md); 
        }
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group-full { grid-column: 1 / -1; }
        
        label { font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { 
            padding: 14px 16px; 
            border: 1px solid #cbd5e1; 
            border-radius: 10px; 
            font-size: 14px; 
            background: #f8fafc; 
            color: var(--primary);
            font-family: inherit;
            transition: all 0.2s ease; 
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }
        input:focus, select:focus { 
            border-color: var(--accent); 
            background: #ffffff;
            outline: none; 
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--accent), var(--accent-hover)); 
            color: white; 
            border: none; 
            padding: 16px 32px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 700; 
            width: 100%; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            font-size: 16px; 
            margin-top: 15px; 
            letter-spacing: 0.5px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3);
        }
        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); 
        }

        .filter-section { 
            background: linear-gradient(to right, #0f172a, #1e293b); 
            padding: 20px; 
            border-radius: var(--radius) var(--radius) 0 0; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
        }
        .filter-section select { 
            background: rgba(255, 255, 255, 0.1); 
            color: white; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 10px 24px; 
            font-weight: 600; 
            cursor: pointer; 
            border-radius: 8px;
            font-size: 14px;
        }
        .filter-section select option { background: var(--primary); color: white; }

        .table-container { 
            background: var(--card-bg); 
            border-radius: 0 0 var(--radius) var(--radius); 
            box-shadow: var(--shadow-lg); 
            overflow-x: auto; 
            border: 1px solid var(--border);
            border-top: none;
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1100px; }
        th { 
            background: #f1f5f9; 
            padding: 16px 20px; 
            text-align: left; 
            font-size: 12px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
            color: var(--secondary); 
            border-bottom: 2px solid var(--border); 
        }
        td { 
            padding: 16px 20px; 
            border-bottom: 1px solid var(--border); 
            font-size: 14px; 
            vertical-align: middle; 
            color: var(--text-main);
            transition: background-color 0.2s;
        }
        tr:hover td { background-color: #f8fafc; }
        tr:last-child td { border-bottom: none; }
        
        .divisor-dia { border-top: 3px solid #cbd5e1 !important; background-color: #f8fafc; }
        .badge-status { 
            font-weight: 700; 
            padding: 6px 12px; 
            border-radius: 8px; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            display: inline-block; 
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .col-longa { min-width: 150px; max-width: 250px; word-wrap: break-word; white-space: normal !important; }
        
        /* Ícones de Ação */
        .btn-whatsapp { color: #25d366; text-decoration: none; font-size: 22px; cursor: pointer; margin-right: 12px; transition: transform 0.2s; display: inline-block; }
        .btn-whatsapp:hover { transform: scale(1.15); }
        
        .btn-edit { color: var(--warning); background: none; border: none; font-size: 20px; cursor: pointer; transition: transform 0.2s; margin-right: 10px; padding: 0; }
        .btn-edit:hover { transform: scale(1.15); }
        
        .btn-delete { color: var(--danger); background: none; border: none; font-size: 24px; cursor: pointer; transition: transform 0.2s; padding: 0; line-height: 1; }
        .btn-delete:hover { transform: scale(1.15); }

        /* Customização da scrollbar para o select múltiplo */
        select[multiple]::-webkit-scrollbar { width: 8px; }
        select[multiple]::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        select[multiple]::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        select[multiple]::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>AGENDA VIATURA</h2>
        <h4>Unidade Regional de Ensino - Araçatuba</h4>
    </header>

    <div class="dashboard">
        <div class="stat-card">
            <span class="stat-label">Total de Viagens</span>
            <span class="stat-value" id="statTotal">0</span>
        </div>
        <div class="stat-card" style="border-left-color: var(--spin-color)">
            <span class="stat-label">Viatura SPIN</span>
            <span class="stat-value" id="statSpin">0</span>
        </div>
        <div class="stat-card" style="border-left-color: var(--onix-color)">
            <span class="stat-label">Viatura ONIX</span>
            <span class="stat-value" id="statOnix">0</span>
        </div>
    </div>

    <div class="card">
        <div class="form-grid">
            <div class="form-group"><label>📅 Saída</label><input type="date" id="dSaida"></div>
            <div class="form-group"><label>🕒 Hora</label><input type="time" id="hSaida"></div>
            <div class="form-group"><label>📅 Retorno</label><input type="date" id="dChegada"></div>
            <div class="form-group"><label>🕒 Hora</label><input type="time" id="hChegada"></div>
            <div class="form-group"><label>🚗 Viatura</label><select id="viatura"><option value="SPIN">CHEVROLET SPIN</option><option value="ONIX">CHEVROLET ONIX</option></select></div>
            <div class="form-group">
                <label>👤 Condutor</label>
                <select id="condutor">
                    <option value="">Selecione...</option>
                    <option value="Ágatha">Ágatha</option>
                    <option value="Aline SEOM">Aline SEOM</option>
                    <option value="Andréa Zapte">Andréa Zapte</option>
                    <option value="Baraldi">Baraldi</option>
                    <option value="Gustavo">Gustavo</option>
                    <option value="Heber">Heber</option>
                    <option value="Helder">Helder</option>
                    <option value="Juliana">Juliana</option>
                    <option value="Marcelo Bevilaqua">Marcelo Bevilaqua</option>
                    <option value="Mirian">Mirian</option>
                    <option value="Patrícia">Patrícia</option>
                    <option value="Sandra Vieira">Sandra Vieira</option>
                    <option value="Sonia">Sonia</option>
                </select>
            </div>
            <div class="form-group"><label>👥 Passageiro</label><input type="text" id="passageiro" placeholder="Ex: José, Pedro"></div>
            <div class="form-group"><label>🏢 Seção</label><input type="text" id="secao" placeholder="Ex: SEINTEC"></div>
            <div class="form-group form-group-full">
                <label>📍 Destino</label>
                <select id="destino" multiple style="height: 150px;">
                    <optgroup label="Municípios">
                        <option value="Andradina">Andradina</option><option value="Birigui">Birigui</option>
                        <option value="Fernandópolis">Fernandópolis</option><option value="Jales">Jales</option>
                        <option value="José Bonifácio">José Bonifácio</option>
                        <option value="Penápolis">Penápolis</option><option value="São José do Rio Preto">São José do Rio Preto</option>
                        <option value="São Paulo">São Paulo</option><option value="Votuporanga">Votuporanga</option>
                        <option value="Outro">Outro</option>
                    </optgroup>
                    <optgroup label="Escolas">
                        <option value="Abranche José">Abranche José</option><option value="Aimone Sala">Aimone Sala</option>
                        <option value="Altina Moraes Sampaio">Altina Moraes Sampaio</option><option value="Arlinda Pessoa Morbeck">Arlinda Pessoa Morbeck</option>
                        <option value="Arthur Leite Carrijo">Arthur Leite Carrijo</option><option value="Ary Bocuhy">Ary Bocuhy</option>
                        <option value="CEEJA">CEEJA</option><option value="Clóvis de Arruda Campos">Clóvis de Arruda Campos</option>
                        <option value="David Golia">David Golia</option><option value="Ezequiel Barbosa">Ezequiel Barbosa</option>
                        <option value="Francisco Prudente Corrêa">Francisco Prudente Corrêa</option><option value="Genésio de Assis">Genésio de Assis</option>
                        <option value="João Arruda Brasil">João Arruda Brasil</option><option value="João Batista Botelho">João Batista Botelho</option>
                        <option value="Jorge Corrêa">Jorge Corrêa</option><option value="José Arantes Terra">José Arantes Terra</option>
                        <option value="José Augusto Lopes Borges">José Augusto Lopes Borges</option><option value="José Cândido">José Cândido</option>
                        <option value="Joubert de Carvalho">Joubert de Carvalho</option><option value="Licolina V. R. Alves">Licolina V. R. Alves</option>
                        <option value="Lídia Perri Barbosa">Lídia Perri Barbosa</option><option value="Luiz Gama">Luiz Gama</option>
                        <option value="Manoel Bento da Cruz">Manoel Bento da Cruz</option><option value="Maria App. Balthazar Poço">Maria App. Balthazar Poço</option>
                        <option value="Maria do Carmo Lélis">Maria do Carmo Lélis</option><option value="Nilce Maia Souto Melo">Nilce Maia Souto Melo</option>
                        <option value="Olímpio Camargo">Olímpio Camargo</option><option value="Purcina Elisa de Almeida">Purcina Elisa de Almeida</option>
                        <option value="Silvestre Augusto Nascimento">Silvestre Augusto Nascimento</option><option value="Vaniolê Dionysio M. Pavan">Vaniolê Dionysio M. Pavan</option>
                        <option value="Vicente Barbosa">Vicente Barbosa</option><option value="Vitor Antônio Trindade">Vitor Antônio Trindade</option>
                        <option value="Waldemar Queiroz">Waldemar Queiroz</option>
                    </optgroup>
                </select>
                <small style="color: var(--text-muted); font-size: 11px; margin-top: 8px; display: block; font-weight: 500;">Segure CTRL para selecionar vários destinos.</small>
            </div>
            <div class="form-group-full" style="text-align: right;"><button class="btn-primary" onclick="adicionarAgendamento()">Confirmar Agendamento</button></div>
        </div>
    </div>

    <div class="filter-section">
        <select id="filtroMes" onchange="renderizarTabela()">
            <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option>
            <option value="04">Abril</option><option value="05">Maio</option><option value="06">Junho</option>
            <option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option>
            <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
        </select>
        <select id="filtroAno" onchange="renderizarTabela()">
            <option value="2025">2025</option><option value="2026" selected>2026</option>
            <option value="2027">2027</option><option value="2028">2028</option>
            <option value="2029">2029</option><option value="2030">2030</option>
        </select>
    </div>

    <div class="table-container">
        <table>
            <thead><tr><th>Saída</th><th>Hora</th><th>Retorno</th><th>Hora</th><th class="col-longa">Destino</th><th>Viatura</th><th class="col-longa">Condutor</th><th>Passageiro</th><th>Seção</th><th>Status</th><th style="text-align:center">Ações</th></tr></thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>
</div>

<script>
    const URL_DATABASE = "https://script.google.com/macros/s/AKfycby3eT0a4Nk9UJRauZ4xMopOcl_9CoiaBBZVzJKx18sXxGpRhYDdxSQVVdu4U1cJ13Hp/exec";
    let dadosGlobais = [];
    
    // VARIÁVEL PARA RASTREAR A EDIÇÃO
    let editandoItemOriginal = null;

    async function adicionarAgendamento() {
        const btn = document.querySelector('.btn-primary');
        const destinos = Array.from(document.getElementById('destino').selectedOptions).map(o => o.value);
        const fields = {
            dSaida: document.getElementById('dSaida').value,
            hSaida: document.getElementById('hSaida').value,
            dChegada: document.getElementById('dChegada').value,
            hChegada: document.getElementById('hChegada').value,
            viatura: document.getElementById('viatura').value,
            condutor: document.getElementById('condutor').value,
            passageiro: document.getElementById('passageiro').value,
            secao: document.getElementById('secao').value,
            destino: destinos.join(", ")
        };
        
        if(!fields.dSaida || !fields.condutor || destinos.length === 0) return alert("Erro: Preencha Data, Condutor e pelo menos um Destino!");
        
        btn.innerText = "☁️ Gravando na Planilha..."; 
        btn.disabled = true;
        
        try {
            // LÓGICA DE EDIÇÃO: Exclui o item antigo antes de adicionar o atualizado
            if (editandoItemOriginal) {
                editandoItemOriginal.action = 'delete';
                await fetch(URL_DATABASE, { method: 'POST', body: JSON.stringify(editandoItemOriginal) });
            }

            await fetch(URL_DATABASE, { method: 'POST', body: JSON.stringify(fields) });
            alert(editandoItemOriginal ? "Sucesso! Agendamento atualizado." : "Sucesso! Agendamento registrado na Planilha Google.");
            location.reload();
        } catch (e) { 
            alert("Erro ao conectar com a planilha."); 
            btn.disabled = false; 
            btn.innerText = editandoItemOriginal ? "💾 Salvar Edição" : "Confirmar Agendamento"; 
        }
    }

    // NOVA FUNÇÃO DE EDIÇÃO
    function editar(idx) {
        const item = dadosGlobais[idx];
        editandoItemOriginal = item; // Guarda o item para ser substituído

        // Formata as datas para o formato do input (YYYY-MM-DD)
        let dSaida = item.dSaida;
        if (dSaida && dSaida.includes('/')) dSaida = dSaida.split('/').reverse().join('-');
        let dChegada = item.dChegada;
        if (dChegada && dChegada.includes('/')) dChegada = dChegada.split('/').reverse().join('-');

        // Preenche os campos do formulário
        document.getElementById('dSaida').value = dSaida || '';
        document.getElementById('hSaida').value = item.hSaida || '';
        document.getElementById('dChegada').value = dChegada || '';
        document.getElementById('hChegada').value = item.hChegada || '';
        document.getElementById('viatura').value = item.viatura || 'SPIN';
        document.getElementById('condutor').value = item.condutor || '';
        document.getElementById('passageiro').value = item.passageiro || '';
        document.getElementById('secao').value = item.secao || '';

        // Preenche os destinos múltiplos
        const destinosArray = item.destino ? item.destino.split(',').map(s => s.trim()) : [];
        const selDestino = document.getElementById('destino');
        for (let i = 0; i < selDestino.options.length; i++) {
            selDestino.options[i].selected = destinosArray.includes(selDestino.options[i].value);
        }

        // Atualiza o botão e rola a tela para o topo
        const btn = document.querySelector('.btn-primary');
        btn.innerText = "💾 Salvar Edição";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function calcularStatus(dS, hS, dC, hC) {
        const agora = new Date();
        const inicio = new Date(`${dS.split('/').reverse().join('-')}T${hS || '00:00'}`);
        const fimData = (dC && dC !== "-") ? dC.split('/').reverse().join('-') : dS.split('/').reverse().join('-');
        const fim = new Date(`${fimData}T${hC || '23:59'}`);

        if (agora > fim) return { txt: 'Concluído', bg: '#dcfce7', tc: '#166534' };
        if (agora >= inicio && agora <= fim) return { txt: 'Em Trânsito', bg: '#fef9c3', tc: '#854d0e' };
        return { txt: 'Agendado', bg: '#dbeafe', tc: '#1e40af' };
    }

    async function renderizarTabela() {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "<tr><td colspan='11' style='text-align:center; padding: 40px; font-weight: 500; color: var(--secondary);'>🔄 Sincronizando com a Nuvem...</td></tr>";
        try {
            const res = await fetch(URL_DATABASE);
            dadosGlobais = await res.json();
            
            dadosGlobais.sort((a, b) => {
                const dataA = new Date(a.dSaida.split('/').reverse().join('-') + 'T' + (a.hSaida || '00:00'));
                const dataB = new Date(b.dSaida.split('/').reverse().join('-') + 'T' + (b.hSaida || '00:00'));
                return dataA - dataB;
            });

            const mesSel = document.getElementById('filtroMes').value;
            const anoSel = document.getElementById('filtroAno').value;

            const filtrados = dadosGlobais.filter(item => {
                const d = item.dSaida || "";
                return (d.includes(`/${mesSel}/`) && d.includes(anoSel)) || d.includes(`${anoSel}-${mesSel}`);
            });

            corpo.innerHTML = filtrados.length ? "" : "<tr><td colspan='11' style='text-align:center; padding: 40px; font-weight: 500; color: var(--secondary);'>Nenhum registro encontrado para este período.</td></tr>";
            
            let ultimoDia = "";
            filtrados.forEach((item) => {
                const rowIdx = dadosGlobais.indexOf(item);
                let dExib = item.dSaida; if(dExib.includes('-')) dExib = dExib.split('-').reverse().join('/');
                let rExib = item.dChegada; if(rExib.includes('-')) rExib = rExib.split('-').reverse().join('/');

                const status = calcularStatus(dExib, item.hSaida, rExib, item.hChegada);
                const classeDivisor = (ultimoDia !== "" && ultimoDia !== dExib) ? "divisor-dia" : "";
                ultimoDia = dExib;

                // BOTÃO DE EDITAR ADICIONADO ABAIXO NA COLUNA DE AÇÕES
                corpo.innerHTML += `<tr class="${classeDivisor}">
                    <td><b>${dExib}</b></td><td>${item.hSaida}</td>
                    <td>${rExib || '-'}</td><td>${item.hChegada || '-'}</td>
                    <td class="col-longa"><b>${item.destino}</b></td>
                    <td><span style="font-weight: 800; color: ${item.viatura === 'SPIN' ? 'var(--spin-color)' : 'var(--onix-color)'}">${item.viatura}</span></td>
                    <td class="col-longa"><b>${item.condutor}</b></td>
                    <td>${item.passageiro || '-'}</td><td>${item.secao || '-'}</td>
                    <td><span class="badge-status" style="background:${status.bg}; color:${status.tc}">${status.txt}</span></td>
                    <td style="text-align:center; white-space:nowrap">
                        <a class="btn-whatsapp" title="WhatsApp" onclick="enviarZap(${rowIdx})">📲</a>
                        <button class="btn-edit" title="Editar" onclick="editar(${rowIdx})">✏️</button>
                        <button class="btn-delete" title="Excluir" onclick="excluir(${rowIdx})">×</button>
                    </td>
                </tr>`;
            });
            
            // Contagem dos cards filtrando apenas pelo Mês, independente do Ano
            const contagemMes = dadosGlobais.filter(item => {
                const d = item.dSaida || "";
                if (d.includes('-')) return d.split('-')[1] === mesSel;
                if (d.includes('/')) return d.split('/')[1] === mesSel;
                return false;
            });

            document.getElementById('statTotal').innerText = contagemMes.length;
            document.getElementById('statSpin').innerText = contagemMes.filter(i => i.viatura.includes('SPIN')).length;
            document.getElementById('statOnix').innerText = contagemMes.filter(i => i.viatura.includes('ONIX')).length;
            
        } catch (e) { corpo.innerHTML = "<tr><td colspan='11' style='text-align:center; padding: 20px; font-weight: 500; color: var(--danger);'>Erro ao carregar dados da planilha.</td></tr>"; }
    }

    function enviarZap(idx) {
        const item = dadosGlobais[idx];
        let d = item.dSaida; if(d.includes('-')) d = d.split('-').reverse().join('/');
        const msg = `Olá *${item.condutor}*, viagem confirmada para *${item.destino}*:\n📅 *Saída:* ${d} às ${item.hSaida}\n🚗 *Viatura:* ${item.viatura}`;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
    }

    async function excluir(idx) {
        if(confirm("Tem certeza que deseja apagar este registro permanentemente da planilha?")) {
            const item = dadosGlobais[idx];
            item.action = 'delete';
            try {
                await fetch(URL_DATABASE, { method: 'POST', body: JSON.stringify(item) });
                location.reload();
            } catch (e) { alert("Erro ao tentar excluir o registro."); }
        }
    }

    window.onload = () => {
        const hoje = new Date();
        document.getElementById('filtroMes').value = String(hoje.getMonth() + 1).padStart(2, '0');
        renderizarTabela();
    };
</script>
</body>
</html>
